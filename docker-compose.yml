services:
  xtream-downloader:
    image: ghcr.io/devwael/xtream-downloader:latest
    container_name: xtream-downloader
    restart: unless-stopped
    ports:
      - "9876:8080"
    environment:
      - XTREAM_URL=http://your-provider:port
      - XTREAM_USERNAME=your_username
      - XTREAM_PASSWORD=your_password
      - CONFIG_DIR=/config
      - NODE_ENV=production
    volumes:
      # Persistent configuration and download queue state
      - ./config:/config
      
      # Media volumes — adjust paths to match your system
      # On TrueNAS, use dataset paths like /mnt/Storage/media/movies
      - /mnt/Storage/media/movies:/movies
      - /mnt/Storage/media/cartoon:/cartoon
      
    labels:
      org.truenas.webui.port: "9876"

x-portals:
  webui:
    host: 0.0.0.0
    name: Web UI
    path: /
    port: 9876
    scheme: http
